
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --serif:'DM Serif Display',serif;
    --sans:'DM Sans',sans-serif;
    --stone:#2C2C2A;--stone-mid:#888780;--stone-light:#F1EFE8;--stone-border:#D3D1C7;
    --teal-bg:#E1F5EE;--teal-mid:#1D9E75;--teal-dark:#085041;
    --amber-bg:#FAEEDA;--amber-mid:#BA7517;--amber-dark:#633806;
    --coral-bg:#FAECE7;--coral-mid:#D85A30;--coral-dark:#4A1B0C;
    --purple-bg:#EEEDFE;--purple-mid:#534AB7;--purple-dark:#26215C;
  }
  body{font-family:var(--sans);background:transparent;color:var(--stone)}

  #app{max-width:680px;margin:0 auto;padding:1.5rem 0 2rem}

  .screen{display:none}
  .screen.active{display:block}

  /* SCREEN 1 — Diagnostic */
  .wordmark{font-family:var(--serif);font-size:22px;letter-spacing:-.5px;margin-bottom:.25rem}
  .tagline{font-size:13px;color:var(--stone-mid);margin-bottom:2rem}

  .field-label{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--stone-mid);margin-bottom:.5rem}
  .field{margin-bottom:1.25rem}

  select,input[type=text]{
    width:100%;height:40px;padding:0 12px;border:0.5px solid var(--stone-border);
    border-radius:8px;font-family:var(--sans);font-size:14px;
    background:var(--color-background-primary,#fff);color:var(--stone);
    appearance:none;-webkit-appearance:none;cursor:pointer;
  }
  select{background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23888780' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}

  .progress-group{display:flex;flex-direction:column;gap:8px}
  .prog-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border:0.5px solid var(--stone-border);border-radius:8px;cursor:pointer;transition:background .15s}
  .prog-row:hover{background:var(--stone-light)}
  .prog-row.selected{background:var(--teal-bg);border-color:var(--teal-mid)}
  .prog-row input[type=radio]{accent-color:var(--teal-mid);width:16px;height:16px;flex-shrink:0}
  .prog-row .prog-label{font-size:14px;font-weight:500}
  .prog-row .prog-desc{font-size:12px;color:var(--stone-mid);margin-top:1px}

  .cta{width:100%;height:44px;background:var(--stone);color:#fff;border:none;border-radius:8px;
    font-family:var(--sans);font-size:15px;font-weight:500;cursor:pointer;margin-top:.5rem;transition:opacity .2s}
  .cta:hover{opacity:.85}
  .cta:disabled{opacity:.4;cursor:not-allowed}

  /* SCREEN 2 — Roadmap */
  .back-btn{background:none;border:0.5px solid var(--stone-border);border-radius:6px;padding:5px 10px;
    font-size:12px;color:var(--stone-mid);cursor:pointer;font-family:var(--sans);margin-bottom:1.25rem}
  .back-btn:hover{background:var(--stone-light)}

  .student-banner{background:var(--stone-light);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.5rem;
    display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
  .student-name{font-family:var(--serif);font-size:18px}
  .student-meta{font-size:13px;color:var(--stone-mid);margin-top:2px}
  .badge{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .badge-teal{background:var(--teal-bg);color:var(--teal-dark)}
  .badge-amber{background:var(--amber-bg);color:var(--amber-dark)}
  .badge-coral{background:var(--coral-bg);color:var(--coral-dark)}

  .section-header{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;
    color:var(--stone-mid);margin:1.5rem 0 .75rem;display:flex;align-items:center;gap:8px}
  .section-line{flex:1;height:0.5px;background:var(--stone-border)}

  .milestone-list{display:flex;flex-direction:column;gap:6px}
  .milestone{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border:0.5px solid var(--stone-border);
    border-radius:8px;cursor:pointer;transition:all .15s;position:relative}
  .milestone.done{background:var(--teal-bg);border-color:#9FE1CB}
  .milestone.active-item{border-color:var(--stone);background:var(--color-background-primary,#fff)}
  .milestone.locked{opacity:.45;cursor:default}

  .check{width:20px;height:20px;border-radius:50%;border:0.5px solid var(--stone-border);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;background:#fff}
  .milestone.done .check{background:var(--teal-mid);border-color:var(--teal-mid)}
  .checkmark{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:none}
  .milestone.done .checkmark{display:block}
  .lock-icon{font-size:10px;display:none}
  .milestone.locked .lock-icon{display:block;color:var(--stone-mid)}
  .milestone.locked .check{border-style:dashed}

  .m-content{flex:1;min-width:0}
  .m-title{font-size:14px;font-weight:500;line-height:1.3}
  .m-sub{font-size:12px;color:var(--stone-mid);margin-top:2px}
  .m-week{font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;white-space:nowrap;align-self:flex-start;margin-top:1px}
  .week-now{background:var(--purple-bg);color:var(--purple-dark)}
  .week-soon{background:var(--amber-bg);color:var(--amber-dark)}
  .week-later{background:var(--stone-light);color:var(--stone-mid)}

  .progress-bar-wrap{margin:1.5rem 0 .5rem}
  .pb-label{display:flex;justify-content:space-between;font-size:12px;color:var(--stone-mid);margin-bottom:6px}
  .pb-track{height:6px;background:var(--stone-light);border-radius:99px;overflow:hidden}
  .pb-fill{height:100%;background:var(--teal-mid);border-radius:99px;transition:width .5s ease}

  .tip-box{background:var(--purple-bg);border-radius:8px;padding:.875rem 1rem;margin-top:1.5rem;
    font-size:13px;color:var(--purple-dark);line-height:1.5}
  .tip-box strong{font-weight:500}
</style>

<div id="app">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Cornerstone: personalized academic roadmap builder for high school students</h2>

  <!-- Screen 1: Diagnostic -->
  <div class="screen active" id="s-diag">
    <div class="wordmark">Cornerstone</div>
    <div class="tagline">Build the foundation. Catch up with confidence.</div>

    <div class="field">
      <div class="field-label">Your name</div>
      <input type="text" id="inp-name" placeholder="e.g. Jordan Kim" />
    </div>

    <div class="field">
      <div class="field-label">Grade</div>
      <select id="inp-grade">
        <option value="">Select grade…</option>
        <option>9th grade</option>
        <option>10th grade</option>
        <option>11th grade</option>
        <option>12th grade</option>
      </select>
    </div>

    <div class="field">
      <div class="field-label">Current course</div>
      <select id="inp-course">
        <option value="">Select course…</option>
        <option value="algebra2">Algebra II</option>
        <option value="precalc">Pre-Calculus</option>
        <option value="biology">Biology</option>
        <option value="chemistry">Chemistry</option>
        <option value="usgov">U.S. Government</option>
        <option value="english10">English 10 — Literary Analysis</option>
      </select>
    </div>

    <div class="field">
      <div class="field-label">How are you feeling in this class right now?</div>
      <div class="progress-group" id="prog-group">
        <label class="prog-row" onclick="selectProg(this)">
          <input type="radio" name="prog" value="lost">
          <div><div class="prog-label">Completely lost</div><div class="prog-desc">Most lessons feel unfamiliar — I'm missing a lot of foundation</div></div>
        </label>
        <label class="prog-row" onclick="selectProg(this)">
          <input type="radio" name="prog" value="gaps">
          <div><div class="prog-label">Some big gaps</div><div class="prog-desc">I understand parts, but key concepts trip me up</div></div>
        </label>
        <label class="prog-row" onclick="selectProg(this)">
          <input type="radio" name="prog" value="shaky">
          <div><div class="prog-label">Shaky on a few things</div><div class="prog-desc">Mostly following along, but a few topics feel fuzzy</div></div>
        </label>
      </div>
    </div>

    <button class="cta" id="gen-btn" onclick="generateRoadmap()" disabled>Generate my roadmap →</button>
  </div>

  <!-- Screen 2: Roadmap -->
  <div class="screen" id="s-roadmap">
    <button class="back-btn" onclick="goBack()">← Start over</button>

    <div class="student-banner">
      <div>
        <div class="student-name" id="r-name"></div>
        <div class="student-meta" id="r-meta"></div>
      </div>
      <span class="badge" id="r-badge"></span>
    </div>

    <div class="progress-bar-wrap">
      <div class="pb-label"><span>Foundation progress</span><span id="pb-pct">0%</span></div>
      <div class="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
    </div>

    <div class="section-header"><span>Priority gaps to close</span><div class="section-line"></div></div>
    <div class="milestone-list" id="gaps-list"></div>

    <div class="section-header"><span>Coming up next</span><div class="section-line"></div></div>
    <div class="milestone-list" id="next-list"></div>

    <div class="tip-box" id="tip-box"></div>
  </div>
</div>

function selectProg(el){
  document.querySelectorAll('.prog-row').forEach(r=>r.classList.remove('selected'));
  el.classList.add('selected');
  validateForm();
}
function validateForm(){
  const name=document.getElementById('inp-name').value.trim();
  const course=document.getElementById('inp-course').value;
  const grade=document.getElementById('inp-grade').value;
  const prog=document.querySelector('input[name=prog]:checked');
  document.getElementById('gen-btn').disabled=!(name&&course&&grade&&prog);
}
document.getElementById('inp-name').addEventListener('input',validateForm);
document.getElementById('inp-course').addEventListener('change',validateForm);
document.getElementById('inp-grade').addEventListener('change',validateForm);

function generateRoadmap(){
  const name=document.getElementById('inp-name').value.trim();
  const grade=document.getElementById('inp-grade').value;
  const courseKey=document.getElementById('inp-course').value;
  const prog=document.querySelector('input[name=prog]:checked').value;
  const data=CURRICULUM[courseKey];

  document.getElementById('r-name').textContent=name;
  document.getElementById('r-meta').textContent=grade+' · '+data.label;

  const badgeEl=document.getElementById('r-badge');
  const badges={lost:['Needs foundation work','badge-coral'],gaps:['Some gaps to close','badge-amber'],shaky:['Almost caught up','badge-teal']};
  badgeEl.textContent=badges[prog][0];
  badgeEl.className='badge '+badges[prog][1];

  const milestones=data[prog];
  const gaps=milestones.filter(m=>m.phase==='gap');
  const nexts=milestones.filter(m=>m.phase==='next');

  const doneCount=prog==='shaky'?2:prog==='gaps'?1:0;
  let done=0;

  function renderList(items,containerId,startDone){
    const el=document.getElementById(containerId);
    el.innerHTML='';
    items.forEach((m,i)=>{
      const isDone=(i<startDone);
      const isLocked=false;
      const div=document.createElement('div');
      div.className='milestone'+(isDone?' done':'');
      if(isDone)done++;
      const weekClass=m.phase==='gap'?'week-now':'week-soon';
      div.innerHTML=`
        <div class="check">
          <svg class="checkmark" viewBox="0 0 10 8"><polyline points="1 4 3.5 6.5 9 1"/></svg>
          <span class="lock-icon">🔒</span>
        </div>
        <div class="m-content">
          <div class="m-title">${m.title}</div>
          <div class="m-sub">${m.sub}</div>
        </div>
        <span class="m-week ${weekClass}">${m.week}</span>`;
      if(!isDone){
        div.addEventListener('click',()=>{
          div.classList.toggle('done');
          updateProgress(milestones.length);
        });
      }
      el.appendChild(div);
    });
  }

  renderList(gaps,'gaps-list',doneCount>0?1:0);
  renderList(nexts,'next-list',0);

  const total=milestones.length;
  const initDone=doneCount>0?1:0;
  const pct=Math.round((initDone/total)*100);
  document.getElementById('pb-pct').textContent=pct+'%';
  document.getElementById('pb-fill').style.width=pct+'%';

  document.getElementById('tip-box').innerHTML=`<strong>Your focus tip:</strong> ${data.tip[prog]}`;

  document.getElementById('s-diag').classList.remove('active');
  document.getElementById('s-roadmap').classList.add('active');

  setTimeout(()=>{
    const fill=document.getElementById('pb-fill');
    fill.style.width=pct+'%';
  },100);
}

function updateProgress(total){
  const checked=document.querySelectorAll('.milestone.done').length;
  const pct=Math.round((checked/total)*100);
  document.getElementById('pb-pct').textContent=pct+'%';
  document.getElementById('pb-fill').style.width=pct+'%';
}

function goBack(){
  document.getElementById('s-roadmap').classList.remove('active');
  document.getElementById('s-diag').classList.add('active');
}
</script>

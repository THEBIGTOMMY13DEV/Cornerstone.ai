<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cornerstone AI</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app">
    <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Cornerstone:
      personalized academic roadmap builder for high school students</h2>

    <!-- Screen 1: Diagnostic -->
    <div class="screen active" id="s-diag">
      <div class="wordmark">Cornerstone</div>
      <div class="tagline">Build the foundation. Catch up with confidence.</div>

      <div class="field">
        <div class="field-label">Your name</div>
        <input type="text" id="inp-name" placeholder="e.g. Jordan Kim" />
      </div>

      <div class="field">
        <div class="field-label">Grade</div>
        <select id="inp-grade">
          <option value="">Select grade…</option>
          <option>9th grade</option>
          <option>10th grade</option>
          <option>11th grade</option>
          <option>12th grade</option>
        </select>
      </div>

      <div class="field">
        <div class="field-label">Current course</div>
        <select id="inp-course">
          <option value="">Select course…</option>
          <option value="algebra2">Algebra II</option>
          <option value="precalc">Pre-Calculus</option>
          <option value="biology">Biology</option>
          <option value="chemistry">Chemistry</option>
          <option value="usgov">U.S. Government</option>
          <option value="english10">English 10 — Literary Analysis</option>
        </select>
      </div>

      <div class="field">
        <div class="field-label">How are you feeling in this class right now?</div>
        <div class="progress-group" id="prog-group">
          <label class="prog-row" onclick="selectProg(this)">
            <input type="radio" name="prog" value="lost">
            <div>
              <div class="prog-label">Completely lost</div>
              <div class="prog-desc">Most lessons feel unfamiliar — I'm missing a lot of foundation</div>
            </div>
          </label>
          <label class="prog-row" onclick="selectProg(this)">
            <input type="radio" name="prog" value="gaps">
            <div>
              <div class="prog-label">Some big gaps</div>
              <div class="prog-desc">I understand parts, but key concepts trip me up</div>
            </div>
          </label>
          <label class="prog-row" onclick="selectProg(this)">
            <input type="radio" name="prog" value="shaky">
            <div>
              <div class="prog-label">Shaky on a few things</div>
              <div class="prog-desc">Mostly following along, but a few topics feel fuzzy</div>
            </div>
          </label>
        </div>
      </div>

      <button class="cta" id="gen-btn" onclick="generateRoadmap()" disabled>Generate my roadmap →</button>
    </div>

    <!-- Screen 2: Roadmap -->
    <div class="screen" id="s-roadmap">
      <button class="back-btn" onclick="goBack()">← Start over</button>

      <div class="student-banner">
        <div>
          <div class="student-name" id="r-name"></div>
          <div class="student-meta" id="r-meta"></div>
        </div>
        <span class="badge" id="r-badge"></span>
      </div>

      <div class="progress-bar-wrap">
        <div class="pb-label"><span>Foundation progress</span><span id="pb-pct">0%</span></div>
        <div class="pb-track">
          <div class="pb-fill" id="pb-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="section-header"><span>Priority gaps to close</span>
        <div class="section-line"></div>
      </div>
      <div class="milestone-list" id="gaps-list"></div>

      <div class="section-header"><span>Coming up next</span>
        <div class="section-line"></div>
      </div>
      <div class="milestone-list" id="next-list"></div>

      <div class="tip-box" id="tip-box"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
